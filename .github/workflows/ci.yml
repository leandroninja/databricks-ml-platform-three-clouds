name: CI — Lint e Testes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Instala dependências de lint
        run: |
          pip install ruff

      - name: Ruff lint — notebooks e utils
        run: |
          ruff check notebooks/ --select E,W,F,I --ignore E501,W291,W293,E302,E303,E402
        continue-on-error: false

      - name: Ruff lint — scripts Python
        run: |
          find . -name "*.py" -not -path "./notebooks/*" -not -path "./.git/*" \
            | xargs ruff check --select E,W,F --ignore E501 || true

  test-utils:
    name: Testes unitários (utils)
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Instala dependências de teste
        run: |
          pip install pytest pytest-cov pyspark==3.5.0 delta-spark==3.1.0

      - name: Roda testes
        run: |
          pytest tests/ -v --cov=notebooks/utils --cov-report=term-missing \
            --cov-fail-under=60 \
            || echo "sem testes ainda — crie em tests/"
        continue-on-error: true

  validate-terraform-azure:
    name: Terraform validate — Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check — Azure
        working-directory: terraform/azure
        run: terraform fmt -check -recursive

      - name: Terraform init — Azure (sem backend)
        working-directory: terraform/azure
        run: terraform init -backend=false

      - name: Terraform validate — Azure
        working-directory: terraform/azure
        run: terraform validate

  validate-terraform-aws:
    name: Terraform validate — AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check — AWS
        working-directory: terraform/aws
        run: terraform fmt -check -recursive

      - name: Terraform init — AWS (sem backend)
        working-directory: terraform/aws
        run: terraform init -backend=false

      - name: Terraform validate — AWS
        working-directory: terraform/aws
        run: terraform validate

  validate-terraform-gcp:
    name: Terraform validate — GCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check — GCP
        working-directory: terraform/gcp
        run: terraform fmt -check -recursive

      - name: Terraform init — GCP (sem backend)
        working-directory: terraform/gcp
        run: terraform init -backend=false

      - name: Terraform validate — GCP
        working-directory: terraform/gcp
        run: terraform validate

  validate-json-configs:
    name: Valida JSON dos jobs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valida JSON dos job configs
        run: |
          for f in config/jobs/*.json; do
            echo "Validando: $f"
            python3 -c "import json,sys; json.load(open('$f'))" \
              && echo "  OK" \
              || { echo "  FALHOU"; exit 1; }
          done

  check-secrets:
    name: Detecta secrets em texto plano
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica padrões de secrets
        run: |
          # detecta padrões comuns de credenciais hardcoded
          patterns=(
            "password\s*=\s*['\"][^'\"]{4,}"
            "secret\s*=\s*['\"][^'\"]{4,}"
            "AKIA[0-9A-Z]{16}"
            "-----BEGIN RSA PRIVATE KEY-----"
          )

          found=0
          for pattern in "${patterns[@]}"; do
            if grep -r -E --include="*.py" --include="*.tf" --include="*.sh" \
              -l "$pattern" . 2>/dev/null | grep -v ".git"; then
              echo "ALERTA: possível secret encontrado com padrão: $pattern"
              found=1
            fi
          done

          if [[ $found -eq 1 ]]; then
            echo "Revisão manual necessária nos arquivos acima"
            exit 1
          fi

          echo "Nenhum secret óbvio encontrado"
